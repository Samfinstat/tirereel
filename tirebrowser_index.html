<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TireReel — Генератор видео</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0b0d;--sur:#111318;--card:#181c22;--brd:rgba(255,255,255,0.07);--brd2:rgba(255,255,255,0.13);--gold:#c9a84c;--gold2:#f0cc7a;--red:#d42b2b;--tx:#e8eaf2;--mt:#7a7e92;--r:8px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Barlow',sans-serif;font-size:14px;min-height:100vh}
header{background:var(--sur);border-bottom:1px solid var(--brd);padding:0 28px;height:56px;display:flex;align-items:center;gap:12px}
.logo{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;letter-spacing:.06em}
.logo span{color:var(--gold)}
.logo-sub{font-size:11px;color:var(--mt);letter-spacing:.1em;text-transform:uppercase}
.layout{display:grid;grid-template-columns:1fr 340px;min-height:calc(100vh - 56px)}
.left{padding:24px 28px;display:flex;flex-direction:column;gap:20px;border-right:1px solid var(--brd);overflow-y:auto}
.right{display:flex;flex-direction:column;background:var(--sur)}
.sec{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.12em;color:var(--gold);margin-bottom:12px}
.dz{border:1.5px dashed rgba(201,168,76,.3);border-radius:10px;padding:28px 16px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(201,168,76,.03);position:relative}
.dz:hover,.dz.over{border-color:var(--gold);background:rgba(201,168,76,.07)}
.dz input{position:absolute;inset:0;opacity:0;cursor:pointer}
.dz-icon{font-size:32px;display:block;margin-bottom:8px}
.dz-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:500;color:var(--tx)}
.dz-sub{font-size:12px;color:var(--mt);margin-top:3px}
.thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.thumb{position:relative;width:80px;height:80px;border-radius:7px;overflow:hidden;border:1px solid var(--brd2)}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb .x{position:absolute;top:3px;right:3px;width:18px;height:18px;background:rgba(0,0,0,.75);border:none;border-radius:50%;cursor:pointer;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center}
.thumb .x:hover{background:#c0392b}
.thumb .n{position:absolute;bottom:3px;left:5px;font-size:10px;color:rgba(255,255,255,.7);font-family:'Oswald',sans-serif}
.add-more{width:80px;height:80px;border-radius:7px;border:1.5px dashed rgba(255,255,255,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--mt);font-size:11px;transition:all .2s}
.add-more:hover{border-color:var(--gold);color:var(--gold)}
.add-more input{display:none}
label.fld{display:block;font-size:11px;font-weight:500;color:var(--mt);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;margin-top:12px}
label.fld:first-child{margin-top:0}
input[type=text],textarea,select{width:100%;background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:8px 11px;color:var(--tx);font-family:'Barlow',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
input[type=text]:focus,textarea:focus,select:focus{border-color:var(--gold)}
textarea{resize:vertical;min-height:64px}
select{cursor:pointer}
select option{background:var(--card)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.prev-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px 16px 12px}
.phone{position:relative;width:180px;aspect-ratio:9/16;background:#000;border-radius:16px;overflow:hidden;border:1.5px solid var(--brd2);box-shadow:0 12px 36px rgba(0,0,0,.6)}
.phone canvas{position:absolute;inset:0;width:100%;height:100%}
.gen-panel{border-top:1px solid var(--brd);padding:16px}
.btn-gen{width:100%;padding:13px;background:var(--gold);color:#0a0b0d;border:none;border-radius:var(--r);font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:background .2s}
.btn-gen:hover{background:var(--gold2)}
.btn-gen:disabled{background:#2a2a2a;color:#555;cursor:not-allowed}
.status{margin-top:10px;font-size:12px;text-align:center;min-height:16px;display:flex;align-items:center;justify-content:center;gap:7px}
.status.err{color:#ff6b6b}
.status.ok{color:#4caf88}
.prog{height:2px;background:rgba(255,255,255,.07);border-radius:1px;margin-top:8px;overflow:hidden;display:none}
.prog-bar{height:100%;background:var(--gold);width:0%;transition:width .3s}
.btn-dl{display:flex;align-items:center;justify-content:center;gap:7px;padding:10px;background:#1d3a28;color:#5dde9a;border:1px solid #2a5e3a;border-radius:var(--r);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:500;text-decoration:none;text-transform:uppercase;cursor:pointer;transition:background .2s;margin-top:8px;width:100%}
.btn-dl:hover{background:#254a32}
.spin{width:13px;height:13px;border:2px solid rgba(201,168,76,.25);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.tip{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.2);border-radius:var(--r);padding:9px 12px;font-size:12px;color:rgba(201,168,76,.85);line-height:1.5}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
@media(max-width:700px){.layout{grid-template-columns:1fr}.right{border-top:1px solid var(--brd)}.left{padding:16px}}
</style>
</head>
<body>

<header>
  <div class="logo">Tire<span>Reel</span></div>
  <div class="logo-sub">Генератор видео для шин</div>
</header>

<div class="layout">
<!-- LEFT -->
<div class="left">

  <div>
    <div class="sec">01 — Фотографии шины</div>
    <div class="dz" id="dz">
      <input type="file" multiple onchange="addFiles(this.files)">
      <span class="dz-icon">📸</span>
      <div class="dz-title">Перетащите фото сюда</div>
      <div class="dz-sub">или нажмите · JPG, PNG · до 5 фото</div>
    </div>
    <div class="thumbs" id="thumbs"></div>
  </div>

  <div>
    <div class="sec">02 — Данные шины</div>
    <label class="fld">Размер шины *</label>
    <input type="text" id="f_size" placeholder="205/55 R16" oninput="drawPreview()">
    <div class="row2">
      <div>
        <label class="fld">Бренд</label>
        <input type="text" id="f_brand" placeholder="Nokian, Michelin..." oninput="drawPreview()">
      </div>
      <div>
        <label class="fld">Логотип / магазин</label>
        <input type="text" id="f_logo" placeholder="ЕВРОШИНА" oninput="drawPreview()">
      </div>
    </div>
    <label class="fld">Описание (плашка)</label>
    <textarea id="f_desc" placeholder="Летние шины&#10;тихий ход · комфорт" oninput="drawPreview()"></textarea>
  </div>

  <div>
    <div class="sec">03 — Оформление</div>
    <div class="row2">
      <div>
        <label class="fld">Цвет плашки</label>
        <select id="f_color" onchange="drawPreview()">
          <option value="#bb1111">🔴 Красный</option>
          <option value="#1a4dbb">🔵 Синий</option>
          <option value="#1a7a2e">🟢 Зелёный</option>
          <option value="#b87800">🟠 Оранжевый</option>
          <option value="#222222">⚫ Чёрный</option>
        </select>
      </div>
      <div>
        <label class="fld">Логотип — позиция</label>
        <select id="f_lpos" onchange="drawPreview()">
          <option value="left">Верх слева</option>
          <option value="right">Верх справа</option>
        </select>
      </div>
    </div>
    <label class="fld" style="margin-top:12px">Длительность</label>
    <select id="f_dur">
      <option value="8">8 секунд</option>
      <option value="10" selected>10 секунд</option>
      <option value="12">12 секунд</option>
    </select>
  </div>

  <div class="tip">💡 Видео генерируется прямо в браузере — никаких серверов. Нажмите "Сгенерировать" и через 15–30 секунд скачайте MP4.</div>
</div>

<!-- RIGHT -->
<div class="right">
  <div class="prev-wrap">
    <div style="text-align:center">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--mt);margin-bottom:12px">Предпросмотр</div>
      <div class="phone"><canvas id="prev" width="270" height="480"></canvas></div>
    </div>
  </div>
  <div class="gen-panel">
    <button type="button" class="btn-gen" id="genBtn" onclick="startGen()">▶ Сгенерировать видео</button>
    <div class="prog" id="prog"><div class="prog-bar" id="progBar"></div></div>
    <div class="status" id="st"></div>
    <div id="dlArea"></div>
  </div>
</div>
</div><!-- layout -->

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const W=540,H=960,FPS=24;
let photos=[]; // {file, url, img}
let animFrame=null;

// ── Drag & drop ───────────────────────────────────────────────────────────────
const dz=document.getElementById('dz');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over')});
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');addFiles(e.dataTransfer.files)});

function addFiles(list){
  for(const f of list){
    if(photos.length>=5)break;
    if(!f.type.startsWith('image/'))continue;
    const url=URL.createObjectURL(f);
    const img=new Image();
    img.onload=()=>{photos.push({file:f,url,img});renderThumbs();drawPreview()};
    img.src=url;
  }
}
function removePhoto(i){URL.revokeObjectURL(photos[i].url);photos.splice(i,1);renderThumbs();drawPreview()}
function renderThumbs(){
  const el=document.getElementById('thumbs');
  el.innerHTML='';
  photos.forEach((p,i)=>{
    const d=document.createElement('div');d.className='thumb';
    d.innerHTML=`<img src="${p.url}"><span class="n">${i+1}</span><button class="x" onclick="removePhoto(${i})">✕</button>`;
    el.appendChild(d);
  });
  if(photos.length<5){
    const a=document.createElement('label');a.className='add-more';
    a.innerHTML=`<input type="file" multiple onchange="addFiles(this.files)"><span style="font-size:18px">+</span><span>Ещё</span>`;
    el.appendChild(a);
  }
}

// ── Preview canvas ────────────────────────────────────────────────────────────
function drawPreview(){
  const cv=document.getElementById('prev');
  const ctx=cv.getContext('2d');
  const pw=cv.width,ph=cv.height;
  ctx.clearRect(0,0,pw,ph);
  const scale=pw/W;

  if(photos.length>0){
    // Draw photo scaled to canvas
    const img=photos[0].img;
    const r=Math.max(pw/img.width,ph/img.height);
    const sw=img.width*r,sh=img.height*r;
    ctx.drawImage(img,(pw-sw)/2,(ph-sh)/2,sw,sh);
    // Dark overlay
    ctx.fillStyle='rgba(0,0,0,0.38)';
    ctx.fillRect(0,0,pw,ph);
    // Vignette
    const vig=ctx.createRadialGradient(pw/2,ph/2,ph*0.2,pw/2,ph/2,ph*0.75);
    vig.addColorStop(0,'rgba(0,0,0,0)');
    vig.addColorStop(1,'rgba(0,0,0,0.65)');
    ctx.fillStyle=vig;ctx.fillRect(0,0,pw,ph);
  } else {
    ctx.fillStyle='#0d0f14';ctx.fillRect(0,0,pw,ph);
  }

  const logo=document.getElementById('f_logo').value.trim();
  const size=document.getElementById('f_size').value.trim();
  const brand=document.getElementById('f_brand').value.trim();
  const desc=document.getElementById('f_desc').value.trim();
  const color=document.getElementById('f_color').value;
  const lpos=document.getElementById('f_lpos').value;

  // Logo
  if(logo){
    ctx.font=`bold ${Math.round(14*scale)}px 'Oswald',sans-serif`;
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.shadowColor='rgba(0,0,0,0.8)';ctx.shadowBlur=4;
    if(lpos==='left'){ctx.textAlign='left';ctx.fillText(logo,Math.round(9*scale),Math.round(18*scale))}
    else{ctx.textAlign='right';ctx.fillText(logo,pw-Math.round(9*scale),Math.round(18*scale))}
    ctx.shadowBlur=0;
  }

  // Banner
  if(desc){
    const by=Math.round(ph*0.705),bh=Math.round(ph*0.155);
    ctx.fillStyle=color+'dd';ctx.fillRect(0,by,pw,bh);
    ctx.textAlign='center';ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=3;
    const lines=desc.split('\n').filter(Boolean).slice(0,2);
    lines.forEach((l,i)=>{
      ctx.font=`bold ${Math.round(13*scale)}px 'Barlow Condensed',sans-serif`;
      ctx.fillStyle='#fff';
      ctx.fillText(l,pw/2,by+Math.round((22+i*18)*scale));
    });
    ctx.shadowBlur=0;
  }

  // Size
  if(size){
    const sy=desc?Math.round(ph*0.875):Math.round(ph*0.845);
    ctx.textAlign='center';ctx.font=`bold ${Math.round(28*scale)}px 'Oswald',sans-serif`;
    ctx.shadowColor='rgba(0,0,0,0.7)';ctx.shadowBlur=6;
    ctx.fillStyle='#fff';ctx.fillText(size,pw/2,sy);ctx.shadowBlur=0;
  }

  // Brand
  if(brand){
    ctx.textAlign='center';ctx.font=`500 ${Math.round(16*scale)}px 'Barlow',sans-serif`;
    ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.shadowColor='rgba(0,0,0,0.6)';ctx.shadowBlur=4;
    ctx.fillText(brand,pw/2,Math.round(ph*0.935));ctx.shadowBlur=0;
  }
}
drawPreview();

// ── Video generation ──────────────────────────────────────────────────────────
async function startGen(){
  if(!photos.length){setSt('Добавьте хотя бы одно фото','err');return}
  const size=document.getElementById('f_size').value.trim();
  if(!size){setSt('Введите размер шины','err');return}

  const btn=document.getElementById('genBtn');
  btn.disabled=true;
  document.getElementById('dlArea').innerHTML='';
  document.getElementById('prog').style.display='block';
  document.getElementById('progBar').style.width='0%';
  setSt('<div class="spin"></div> Генерация...','');

  try{
    const blob=await renderVideo();
    const url=URL.createObjectURL(blob);
    const safe=size.replace(/[^a-zA-Z0-9]/g,'_');
    document.getElementById('progBar').style.width='100%';
    setSt('✅ Готово!','ok');
    document.getElementById('dlArea').innerHTML=
      `<a class="btn-dl" href="${url}" download="${safe}.webm">⬇ Скачать видео</a>`;
  }catch(e){
    setSt('❌ '+e.message,'err');
  }
  btn.disabled=false;
}

async function renderVideo(){
  const dur=parseInt(document.getElementById('f_dur').value)||10;
  const totalFrames=FPS*dur;
  const T_TEXT=Math.floor(totalFrames*0.58); // text appears at 58%

  // Offscreen canvas at full 540x960
  const cv=document.createElement('canvas');
  cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');

  // Check MediaRecorder support
  const mime=MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':'video/webm';
  const stream=cv.captureStream(FPS);
  const rec=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:6000000});
  const chunks=[];
  rec.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data)};

  const logo=document.getElementById('f_logo').value.trim();
  const size=document.getElementById('f_size').value.trim();
  const brand=document.getElementById('f_brand').value.trim();
  const desc=document.getElementById('f_desc').value.trim();
  const color=document.getElementById('f_color').value;
  const lpos=document.getElementById('f_lpos').value;
  const lines=desc.split('\n').filter(Boolean).slice(0,2);
  const nPhotos=photos.length;
  const framesPerPhoto=Math.floor(totalFrames/nPhotos);
  const fadeFr=Math.floor(FPS*0.6);

  // Pre-prepare scaled background images
  const bgCanvases=photos.map(p=>{
    const bc=document.createElement('canvas');bc.width=W;bc.height=H;
    const bx=bc.getContext('2d');
    const img=p.img;
    const r=Math.max(W/img.width,H/img.height);
    const sw=img.width*r,sh=img.height*r;
    bx.drawImage(img,(W-sw)/2,(H-sh)/2,sw,sh);
    return bc;
  });

  return new Promise((resolve,reject)=>{
    rec.start(100);
    let f=0;
    const bar=document.getElementById('progBar');

    function renderFrame(){
      // Which photo
      const pi=Math.min(Math.floor(f/framesPerPhoto),nPhotos-1);
      const fi=f%framesPerPhoto;

      // Zoom: scale from 1.0 to 1.18 within each photo segment
      const zoomT=fi/framesPerPhoto;
      const zoom=1.0+0.18*zoomT;
      const ox=(W-W/zoom)/2, oy=(H-H/zoom)/2;

      ctx.clearRect(0,0,W,H);

      // Draw bg with zoom
      ctx.save();
      ctx.translate(W/2,H/2);
      ctx.scale(zoom,zoom);
      ctx.translate(-W/2,-H/2);
      ctx.drawImage(bgCanvases[pi],0,0);
      ctx.restore();

      // Cross-fade to next photo
      if(nPhotos>1 && pi<nPhotos-1 && fi>=framesPerPhoto-fadeFr){
        const ft=(fi-(framesPerPhoto-fadeFr))/fadeFr;
        ctx.globalAlpha=ft;
        ctx.drawImage(bgCanvases[pi+1],0,0);
        ctx.globalAlpha=1;
      }

      // Dark overlay
      ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillRect(0,0,W,H);

      // Vignette
      const vig=ctx.createRadialGradient(W/2,H/2,H*0.22,W/2,H/2,H*0.78);
      vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,0.7)');
      ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);

      // Logo (always visible)
      if(logo){
        ctx.font='bold 28px Oswald,sans-serif';
        ctx.shadowColor='rgba(0,0,0,0.8)';ctx.shadowBlur=6;
        ctx.fillStyle='rgba(255,255,255,0.92)';
        if(lpos==='left'){ctx.textAlign='left';ctx.fillText(logo,18,36)}
        else{ctx.textAlign='right';ctx.fillText(logo,W-18,36)}
        ctx.shadowBlur=0;
      }

      // Text — fades in after T_TEXT
      const a=f>=T_TEXT?Math.min(1,(f-T_TEXT)/(FPS*0.5)):0;

      if(a>0){
        // Banner
        if(lines.length>0){
          ctx.fillStyle=hexToRgba(color,0.90*a);
          const by=Math.round(H*0.705),bh=Math.round(H*0.155);
          ctx.fillRect(0,by,W,bh);
          ctx.textAlign='center';ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=4;
          lines.forEach((l,i)=>{
            ctx.font='bold 27px "Barlow Condensed",sans-serif';
            ctx.fillStyle=`rgba(255,255,255,${a})`;
            ctx.fillText(l,W/2,by+30+i*34);
          });
          ctx.shadowBlur=0;
        }

        // Size
        if(size){
          const sy=lines.length?Math.round(H*0.875):Math.round(H*0.845);
          ctx.textAlign='center';
          ctx.font='bold 58px Oswald,sans-serif';
          ctx.shadowColor='rgba(0,0,0,0.7)';ctx.shadowBlur=8;
          ctx.fillStyle=`rgba(255,255,255,${a})`;
          ctx.fillText(size,W/2,sy);ctx.shadowBlur=0;
        }

        // Brand
        if(brand){
          ctx.textAlign='center';
          ctx.font='500 30px Barlow,sans-serif';
          ctx.shadowColor='rgba(0,0,0,0.6)';ctx.shadowBlur=5;
          ctx.fillStyle=`rgba(255,255,255,${a*0.88})`;
          ctx.fillText(brand,W/2,Math.round(H*0.935));ctx.shadowBlur=0;
        }
      }

      f++;
      bar.style.width=Math.round(f/totalFrames*95)+'%';

      if(f<totalFrames){
        setTimeout(renderFrame,0);
      } else {
        rec.stop();
      }
    }

    rec.onstop=()=>{
      const blob=new Blob(chunks,{type:mime});
      resolve(blob);
    };
    rec.onerror=e=>reject(e.error||new Error('Ошибка записи'));

    renderFrame();
  });
}

function hexToRgba(hex,a){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function setSt(html,cls){
  const el=document.getElementById('st');
  el.className='status '+cls;
  el.innerHTML=html;
}
</script>
</body>
</html>
